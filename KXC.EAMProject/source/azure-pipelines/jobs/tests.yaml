jobs:
  - job: Pester
    displayName: 'Pester + PSScriptAnalyzer + platyPS'
    steps:

      - template: ../steps/debug-vars.yaml

      - task: PowerShell@2
        displayName: 'Install required modules'
        inputs:
          targetType: 'inline'
          pwsh: true
          script: |
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
            Install-Module Pester           -MinimumVersion 5.4.1  -Scope CurrentUser -SkipPublisherCheck -Force
            Install-Module PSScriptAnalyzer -MinimumVersion 1.21.0 -Scope CurrentUser -Force
            Install-Module platyPS          -MinimumVersion 0.14.2 -Scope CurrentUser -Force

      - task: PowerShell@2
        displayName: 'Run PSScriptAnalyzer'
        inputs:
          targetType: 'inline'
          pwsh: true
          script: |
            $results = Invoke-ScriptAnalyzer `
              -Path '$(Build.SourcesDirectory)/KXC.EnterpriseAccessModel' `
              -Settings '$(Build.SourcesDirectory)/KXC.EnterpriseAccessModel/tests/common/PSScriptAnalyzerSettings.psd1' `
              -Recurse
            if ($results) {
              $results | Format-Table -AutoSize
              throw "PSScriptAnalyzer found $($results.Count) issue(s). Build cannot continue."
            }

      - task: PowerShell@2
        displayName: 'Run Pester tests'
        inputs:
          targetType: 'inline'
          pwsh: true
          script: |
            $config = New-PesterConfiguration
            $config.Run.Path           = '$(Build.SourcesDirectory)/KXC.EnterpriseAccessModel/tests'
            $config.Output.Verbosity   = 'Detailed'
            $config.TestResult.Enabled = $true
            $config.TestResult.OutputPath   = '$(Build.SourcesDirectory)/testResults.xml'
            $config.TestResult.OutputFormat = 'NUnitXml'
            $result = Invoke-Pester -Configuration $config
            if ($result.FailedCount -gt 0) {
              throw "Pester: $($result.FailedCount) test(s) failed."
            }

      - task: PublishTestResults@2
        displayName: 'Publish Pester test results'
        condition: always()
        inputs:
          testResultsFormat: 'NUnit'
          testResultsFiles: '**/testResults.xml'
          failTaskOnFailedTests: true

      - task: PowerShell@2
        displayName: 'Update platyPS docs'
        inputs:
          targetType: 'inline'
          pwsh: true
          script: |
            Import-Module platyPS
            Import-Module '$(Build.SourcesDirectory)/KXC.EnterpriseAccessModel/KXC.EnterpriseAccessModel.psd1' -Force
            Update-MarkdownHelp -Path '$(Build.SourcesDirectory)/KXC.EnterpriseAccessModel/docs'